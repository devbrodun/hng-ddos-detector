# ─────────────────────────────────────────────────────────
#  HNG Anomaly Detector — Central Configuration
#  All detection thresholds live here; never hardcode them.
# ─────────────────────────────────────────────────────────

# ── Nginx log path (mounted via Docker volume) ───────────
log:
  path: /var/log/nginx/hng-access.log

# ── Sliding-window settings ──────────────────────────────
sliding_window:
  duration_seconds: 60          # width of each per-IP / global window

# ── Rolling baseline settings ────────────────────────────
baseline:
  window_minutes: 30            # how many minutes of history to keep
  recalc_interval_seconds: 60   # how often to recompute mean/stddev
  min_samples: 10               # minimum samples before baseline is "ready"
  floor_mean: 0.5               # minimum mean (req/s) so we never divide by ~0
  floor_stddev: 0.1             # minimum stddev so z-score stays finite

# ── Anomaly detection thresholds ─────────────────────────
detection:
  z_score_threshold: 3.0        # flag if z-score > this
  rate_multiplier: 5.0          # flag if rate > mean * this
  error_rate_multiplier: 3.0    # tighten thresholds if 4xx/5xx surge 3× baseline
  # When error surge is active, multiply z_score_threshold by this factor (< 1 = tighter)
  error_surge_z_factor: 0.6
  error_surge_rate_factor: 0.5

# ── Auto-unban backoff schedule (seconds) ────────────────
unban:
  schedule:
    - 600      # 10 minutes
    - 1800     # 30 minutes
    - 7200     # 2 hours
    - -1       # permanent (never unban after this)

# ── Slack integration ─────────────────────────────────────
slack:
  webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  timeout_seconds: 5

# ── Dashboard web server ──────────────────────────────────
dashboard:
  host: "0.0.0.0"
  port: 8080
  refresh_interval_seconds: 3

# ── Audit log ─────────────────────────────────────────────
audit:
  path: /var/log/detector/audit.log

# ── iptables settings ─────────────────────────────────────
iptables:
  chain: INPUT                  # chain to add DROP rules to
  # set to true to actually run iptables (requires root / CAP_NET_ADMIN)
  enabled: true
