networks:
  hng-net:
    driver: bridge

volumes:
  HNG-nginx-logs:
  nextcloud_data:
  db_data:

services:
  db:
    image: mariadb:10.11
    restart: always
    networks:
      - hng-net
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpassword
    volumes:
      - db_data:/var/lib/mysql

  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: always
    depends_on:
      - db
    networks:
      - hng-net
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpassword
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: adminpassword123
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - nextcloud
    networks:
      - hng-net
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx

  detector:
    build: ./detector
    restart: always
    depends_on:
      - nginx
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - PYTHONUNBUFFERED=1
